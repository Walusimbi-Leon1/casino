<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Casino Night 🎰</title>
  <link rel="stylesheet" href="/src/style.css" />

  <!-- Telegram Mini App SDK -->
  <script src="https://telegram.org/js/telegram-webapp.js"></script>
</head>
<body>
  <!-- ═══ JACKPOT BANNER ═══ -->
  <div id="jackpot-banner" class="jackpot-banner hidden">
    <span class="jackpot-text">💰 JACKPOT! 💰</span>
  </div>

  <!-- ═══ SPLASH SCREEN ═══ -->
  <div id="splash-screen" class="screen">
    <div class="splash-glow"></div>
    <h1 class="splash-title">🎰 Casino Night</h1>
    <p class="splash-sub">Las Vegas at your fingertips</p>
    <p id="status-text" class="status-text">Connecting…</p>

    <button id="auth-btn" class="btn btn-discord hidden">
      🔐 Authorize with Discord
    </button>

    <div class="name-row">
      <input
        id="name-input"
        class="input hidden"
        type="text"
        placeholder="Enter your name…"
        maxlength="30"
      />
      <button id="submit-name" class="btn btn-primary hidden">Play</button>
    </div>
  </div>

  <!-- ═══ GAME SCREEN ═══ -->
  <div id="game-screen" class="screen hidden">
    <div class="game-layout">
      <!-- Top bar -->
      <div class="top-bar">
        <div class="top-bar-left">
          <h2 class="neon-title">🎰 Casino Night</h2>
        </div>
        <div class="top-bar-right">
          <button id="close-btn" class="btn btn-close hidden" title="Close game">✕</button>
          <div class="player-info">
            <span id="player-name" class="name">—</span>
            <span id="player-balance" class="balance">1000</span>
          </div>
        </div>
      </div>

      <!-- Machine selector -->
      <div id="machine-selector" class="machine-selector"></div>

      <!-- Slot machine area -->
      <div class="slot-area">
        <div class="slot-machine" id="slot-machine">
          <div class="reel-frame">
            <div id="reel-container" class="reel-container"></div>
          </div>
        </div>

        <div class="slot-controls">
          <div class="bet-controls">
            <button id="bet-down" class="btn btn-sm">−</button>
            <span class="bet-display">Bet: <span id="bet-amount">10</span></span>
            <button id="bet-up" class="btn btn-sm">+</button>
          </div>
          <button id="spin-btn" class="btn btn-spin">🎰 SPIN!</button>
          <p id="spin-result" class="spin-result"></p>
        </div>

        <div class="volume-control">
          <span>🔈</span>
          <input
            type="range"
            id="volume-slider"
            min="0"
            max="1"
            step="0.05"
            value="0.5"
          />
          <span id="volume-label">50%</span>
          <span>🔊</span>
        </div>

        <button id="buy-credits-btn" class="btn btn-buy hidden">⭐ Buy Credits</button>
      </div>

      <!-- Sidebar -->
      <div class="sidebar">
        <div class="leaderboard-panel" id="leaderboard-panel">
          <h3>🏆 Leaderboard</h3>
          <div id="leaderboard">
            <p class="empty-state">No other players yet…</p>
          </div>
        </div>

        <div class="chat-panel" id="chat-panel">
          <h3>💬 Live Chat</h3>
          <div id="chat-messages" class="chat-messages"></div>
          <div class="chat-input-row">
            <input
              id="chat-input"
              type="text"
              placeholder="Type a message…"
              maxlength="200"
            />
            <button id="chat-send">Send</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ═══ PRICING MODAL ═══ -->
  <div id="pricing-modal" class="hidden"></div>

  <script type="module" src="/src/main.ts"></script>
</body>
</html>
